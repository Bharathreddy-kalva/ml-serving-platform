version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mlserving}
      POSTGRES_USER: ${POSTGRES_USER:-mlserving}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlserving"]
      interval: 5s
      timeout: 5s
      retries: 10

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    restart: unless-stopped
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER:-mlserving}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-mlserving}
      --default-artifact-root s3://${S3_MODEL_BUCKET:-mlserving-models}
      --host 0.0.0.0
      --port 5001
    ports:
      - "5001:5001"
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pg_data:
